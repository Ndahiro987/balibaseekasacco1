<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Mode - Bali Baseeka Sacco</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .maintenance-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
        }
        .maintenance-content {
            max-width: 600px;
        }
        .maintenance-icon {
            width: 120px;
            height: 120px;
            background: var(--secondary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: pulse 2s infinite;
        }
        .maintenance-icon i {
            font-size: 50px;
            color: var(--primary-dark);
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .maintenance-content h1 {
            font-size: 36px;
            color: white;
            margin-bottom: 15px;
        }
        .maintenance-content p {
            color: rgba(255,255,255,0.8);
            font-size: 18px;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .maintenance-timer {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .maintenance-timer p {
            margin: 0;
            font-size: 14px;
        }
        .maintenance-timer span {
            color: var(--secondary-color);
            font-weight: 600;
        }
        .maintenance-contact {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 10px;
        }
        .maintenance-contact h4 {
            color: white;
            margin-bottom: 15px;
        }
        .maintenance-contact p {
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <div class="maintenance-content">
            <div class="maintenance-icon">
                <i class="fas fa-tools"></i>
            </div>
            <h1>We'll Be Back Soon!</h1>
            <p>We're currently performing scheduled maintenance to improve our services. We apologize for any inconvenience.</p>
            <div class="maintenance-timer">
                <p>Estimated completion: <span>2 hours</span></p>
            </div>
            <div class="maintenance-contact">
                <h4>Need assistance?</h4>
                <p><i class="fas fa-phone" style="margin-right: 8px;"></i> +254 700 000 000</p>
                <p><i class="fas fa-envelope" style="margin-right: 8px;"></i> support@balibaseeka.co.ke</p>
            </div>
        </div>
    </div>
</body>
</html>
