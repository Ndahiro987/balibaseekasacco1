<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found - Bali Baseeka Sacco</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
        }
        .error-content {
            max-width: 600px;
        }
        .error-code {
            font-size: 150px;
            font-weight: 700;
            color: var(--secondary-color);
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .error-content h1 {
            font-size: 32px;
            color: white;
            margin-bottom: 15px;
        }
        .error-content p {
            color: rgba(255,255,255,0.8);
            font-size: 18px;
            margin-bottom: 30px;
        }
        .error-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .error-btn {
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s;
        }
        .error-btn-primary {
            background: var(--secondary-color);
            color: var(--primary-dark);
        }
        .error-btn-primary:hover {
            transform: translateY(-3px);
        }
        .error-btn-secondary {
            background: transparent;
            border: 2px solid white;
            color: white;
        }
        .error-btn-secondary:hover {
            background: white;
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-content">
            <div class="error-code">404</div>
            <h1>Page Not Found</h1>
            <p>Oops! The page you're looking for doesn't exist. It might have been moved or deleted.</p>
            <div class="error-buttons">
                <a href="index.html" class="error-btn error-btn-primary">Go to Home</a>
                <a href="contact.html" class="error-btn error-btn-secondary">Contact Support</a>
            </div>
        </div>
    </div>
</body>
</html>
